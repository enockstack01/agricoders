services:
  # ── Development ──────────────────────────────────────────────────────────────
  # docker compose --profile dev up
  # Hot-reload, source mounted from host.
  app-dev:
    build:
      context: .
      target: development
    env_file: .env.local
    volumes:
      - .:/app
      - node_modules:/app/node_modules   # keep container's node_modules intact
      - next_cache:/app/.next            # persist Next.js build cache
    ports:
      - "3000:3000"
    profiles: [dev]

  # ── Production ───────────────────────────────────────────────────────────────
  # docker compose --profile prod up --build
  # Runs the compiled standalone bundle.
  app:
    build:
      context: .
      target: production
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_URL:-/sign-in}
        NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_URL:-/sign-up}
        NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL:-/dashboard}
        NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: ${NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL:-/dashboard}
    env_file: .env.local
    ports:
      - "3000:3000"
    profiles: [prod]

volumes:
  node_modules:
  next_cache:
